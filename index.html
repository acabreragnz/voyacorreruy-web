const TODAY = "2026-04-26";
const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Setiembre","Octubre","Noviembre","Diciembre"];

const state = { sport: "all", onlyFuture: true, onlyWeekend: false, search: "" };

function fmtDate(iso) {
  if (!iso) return "?";
  return iso.slice(8,10) + "/" + iso.slice(5,7);
}
function dow(iso) {
  if (!iso) return -1;
  return new Date(iso + "T12:00:00").getDay();
}
function dowName(iso) {
  const d = dow(iso);
  return ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"][d] || "";
}

function render() {
  const evs = EVENTS.filter(e => {
    if (state.sport === "apie") {
      if (e.deporte !== "running" && e.deporte !== "trail") return false;
    } else if (state.sport !== "all" && e.deporte !== state.sport) {
      return false;
    }
    if (state.onlyFuture && e.fecha_inicio && e.fecha_inicio < TODAY) return false;
    if (state.onlyWeekend) {
      const d = dow(e.fecha_inicio);
      if (d !== 0 && d !== 6) return false;
    }
    if (state.search) {
      const q = state.search;
      const hay = [e.evento, e.lugar, e.distancia, e.deporte,
                   (e.sources || []).join(" ")].join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  const byMonth = {};
  for (const e of evs) {
    const k = e.fecha_inicio ? e.fecha_inicio.slice(0,7) : "zzzz-sin-fecha";
    (byMonth[k] = byMonth[k] || []).push(e);
  }
  const keys = Object.keys(byMonth).sort();

  const root = document.getElementById("events");
  root.innerHTML = "";
  if (!keys.length) {
    root.innerHTML = '<div class="empty">No hay eventos que cumplan el filtro.</div>';
  }
  for (const k of keys) {
    const h = document.createElement("h2");
    if (k.startsWith("zzzz")) {
      h.textContent = "Sin fecha";
    } else {
      const [y, m] = k.split("-");
      h.textContent = MONTHS_ES[parseInt(m,10)-1] + " " + y;
    }
    root.appendChild(h);
    for (const e of byMonth[k]) {
      const div = document.createElement("div");
      div.className = "event";
      if (e.fecha_inicio && e.fecha_inicio < TODAY) div.classList.add("past");
      const d = dow(e.fecha_inicio);
      if (d === 0 || d === 6) div.classList.add("weekend");

      const dateBox = document.createElement("div");
      dateBox.className = "date";
      dateBox.innerHTML = fmtDate(e.fecha_inicio) +
        (e.hora ? "<small>" + e.hora + "</small>" : "") +
        (e.fecha_inicio ? "<small>" + dowName(e.fecha_inicio) + "</small>" : "");
      div.appendChild(dateBox);

      const name = document.createElement("div");
      name.className = "name";
      let titulo = e.evento;
      const parts = [];
      if (e.distancia) parts.push(e.distancia);
      if (e.lugar) parts.push(e.lugar);
      const meta = parts.join(" · ");
      const sources = (e.sources || []).map(s => '<span class="badge">' + s + '</span>').join("");
      const merged = (e.sources && e.sources.length > 1) ? '<span class="badge merged">⚑ ' + e.sources.length + ' fuentes</span>' : "";
      const dep = '<span class="badge dep">' + e.deporte + '</span>';
      const circ = e.circuito
        ? '<span class="badge circ" title="Etapa ' + (e.etapa || '?') + ' de ' + e.circuito + '">🏆 ' + e.circuito + (e.etapa ? ' · etapa ' + e.etapa : '') + '</span>'
        : '';
      // Fecha sospechosa: día entre semana + única fuente mtbcalendario
      const dow_n = dow(e.fecha_inicio);
      const is_weekday = dow_n > 0 && dow_n < 6;
      const only_mtbcal = (e.sources || []).length === 1 && (e.sources || [])[0] === 'mtbcalendario';
      const warn = (is_weekday && only_mtbcal) ? '<span class="badge warn" title="día entre semana + única fuente mtbcalendario — verificar flyer">⚠ verificar fecha_inicio</span>' : "";
      const descHtml = e.descripcion
        ? '<details class="desc"><summary>descripción</summary>'
          + '<div class="body">'
          + e.descripcion.replace(/[<>&]/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]))
          + '</div></details>'
        : '';
      name.innerHTML = '<strong>' + titulo + '</strong>' +
        (meta ? '<div class="meta-row">' + meta + '</div>' : "") +
        '<div class="meta-row">' + dep + circ + sources + merged + warn + '</div>' +
        descHtml;
      div.appendChild(name);

      const link = e.registration_url || e.info_url;
      if (link) {
        const a = document.createElement("a");
        a.href = link; a.target = "_blank"; a.rel = "noopener";
        a.className = "go";
        a.textContent = "Inscripción / info ↗";
        div.appendChild(a);
      } else {
        div.appendChild(document.createElement("div"));
      }
      root.appendChild(div);
    }
  }
  document.getElementById("count").textContent = evs.length + " eventos";
}

function renderChamps() {
  const byCirc = {};
  for (const e of EVENTS) {
    if (!e.circuito) continue;
    (byCirc[e.circuito] = byCirc[e.circuito] || []).push(e);
  }
  const root = document.getElementById("view-champs");
  root.innerHTML = "";
  if (!Object.keys(byCirc).length) {
    root.innerHTML = '<div class="empty">Sin campeonatos detectados.</div>';
    return;
  }
  const names = Object.keys(byCirc).sort((a, b) => byCirc[b].length - byCirc[a].length);
  for (const name of names) {
    const stages = byCirc[name].slice().sort((a, b) =>
      (a.etapa || 99) - (b.etapa || 99) || (a.fecha_inicio || "").localeCompare(b.fecha_inicio || "")
    );
    // Si hay numeración explícita y la serie no empieza en 1, agregar
    // placeholders para las etapas faltantes (ej: Salto Run que arranca
    // en 2° porque la 1° ya pasó y no fue capturada por ningún scraper).
    const numbered = stages.filter(s => typeof s.etapa === "number");
    if (numbered.length) {
      const minN = Math.min(...numbered.map(s => s.etapa));
      const present = new Set(numbered.map(s => s.etapa));
      const filled = [];
      for (let n = 1; n < minN; n++) {
        if (!present.has(n)) {
          filled.push({ etapa: n, _placeholder: true });
        }
      }
      stages.unshift(...filled);
    }
    const det = document.createElement("details");
    det.className = "championship";
    const future = stages.filter(s => s.fecha_inicio && s.fecha_inicio >= TODAY).length;
    if (future > 0) det.open = true;
    const realCount = stages.filter(s => !s._placeholder).length;
    const placeholderCount = stages.length - realCount;
    const sum = document.createElement("summary");
    sum.innerHTML = '🏆 ' + name + ' <span style="color: var(--muted); font-weight: 400; font-size: 0.85em;">· ' +
                    realCount + ' etapas' +
                    (placeholderCount ? ' (+' + placeholderCount + ' sin datos)' : '') +
                    (future ? ' · ' + future + ' por venir' : '') + '</span>';
    det.appendChild(sum);
    const stagesDiv = document.createElement("div");
    stagesDiv.className = "stages";
    for (const s of stages) {
      if (s._placeholder) {
        const row = document.createElement("div");
        row.className = "stage placeholder";
        row.innerHTML =
          '<div class="num">#' + s.etapa + '</div>' +
          '<div class="date">—</div>' +
          '<div class="desc">etapa sin datos (probablemente ya disputada)</div>';
        stagesDiv.appendChild(row);
        continue;
      }
      const row = document.createElement("div");
      row.className = "stage";
      if (s.fecha_inicio && s.fecha_inicio < TODAY) row.classList.add("past");
      const isPast = s.fecha_inicio && s.fecha_inicio < TODAY;
      const num = '<div class="num">' + (s.etapa ? "#" + s.etapa : "—") + '</div>';
      const date = '<div class="date">' + fmtDate(s.fecha_inicio) + ' <small style="color: var(--muted);">' +
                   dowName(s.fecha_inicio) + '</small></div>';
      const meta = [s.distancia, s.lugar].filter(Boolean).join(" · ");
      const link = s.registration_url || s.info_url;
      const checkMark = isPast ? '<span class="check" title="Etapa ya disputada">✓</span>' : '';
      const desc = '<div class="desc">' + checkMark + '<strong>' + s.evento + '</strong>' +
                   (link ? ' <a href="' + link + '" target="_blank" rel="noopener" style="font-size:0.8em;">↗</a>' : '') +
                   (meta ? '<small>' + meta + '</small>' : "") + '</div>';
      row.innerHTML = num + date + desc;
      stagesDiv.appendChild(row);
    }
    det.appendChild(stagesDiv);
    root.appendChild(det);
  }
}

document.querySelectorAll('.tabs button[data-tab]').forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll('.tabs button[data-tab]').forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    const tab = b.dataset.tab;
    document.getElementById("view-calendar").style.display = (tab === "calendar") ? "" : "none";
    document.getElementById("view-champs").style.display = (tab === "champs") ? "" : "none";
    if (tab === "champs") renderChamps();
  });
});

document.querySelectorAll('.filters button[data-sport]').forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll('.filters button[data-sport]').forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    state.sport = b.dataset.sport;
    render();
  });
});
document.getElementById("only-future").addEventListener("change", e => {
  state.onlyFuture = e.target.checked;
  render();
});
document.getElementById("only-weekend").addEventListener("change", e => {
  state.onlyWeekend = e.target.checked;
  render();
});
document.getElementById("search").addEventListener("input", e => {
  state.search = e.target.value.trim().toLowerCase();
  render();
});
render();
</script>
